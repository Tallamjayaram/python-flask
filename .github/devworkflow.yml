name: Develop Workflow

on:
  push:
    branches:
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Date Tag
        run: |
          echo "IMAGE_TAG=develop-$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t jayaramtallam/python-flask/app:${IMAGE_TAG} .

      - name: Push Docker Image
        run: |
          docker push jayaramtallam/python-flask/app:${IMAGE_TAG}