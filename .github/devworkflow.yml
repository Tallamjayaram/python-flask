name: Develop Workflow

on:
  push:
    branches:
      - develop

jobs:
  build-push-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Image Tag
        run: |
          IMAGE_TAG=develop-$(date +'%Y%m%d-%H%M')
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t jayaramtallam/python-flask:${IMAGE_TAG} .

      - name: Push Docker Image
        run: |
          docker push jayaramtallam/python-flask:${IMAGE_TAG}

      - name: Update Minikube Deployment
        run: |
          kubectl set image deployment/python-flask \
          python-flask=jayaramtallam/python-flask:${IMAGE_TAG}

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/python-flask
